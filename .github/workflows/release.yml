name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate CI keystore
        run: |
          keytool -genkey -v -keystore "$GITHUB_WORKSPACE/android/app/ci-keystore.jks" \
            -alias ci -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass ci_pass -keypass ci_pass \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=CI"

      - name: Build release APK
        run: flutter build apk --release
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/ci-keystore.jks
          KEYSTORE_PASSWORD: ci_pass
          KEY_ALIAS: ci
          KEY_PASSWORD: ci_pass

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TS Recipe ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
